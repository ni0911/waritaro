services:
  - type: web
    name: waritaro
    env: docker
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    # 新コンテナ起動前にマイグレーションを実行（旧コードが稼働したまま DB を更新）
    # 失敗時はデプロイが中断され、旧コンテナが継続稼働するためダウンタイムが発生しない
    preDeployCommand: bundle exec rails db:migrate
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false          # Render ダッシュボードで手動設定
      - key: DATABASE_URL
        fromDatabase:
          name: waritaro-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"

databases:
  - name: waritaro-db
    plan: free
    region: singapore
