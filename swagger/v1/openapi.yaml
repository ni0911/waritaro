openapi: 3.0.3
info:
  title: ワリタロ会計部 API
  version: "1.0.0"
  description: |
    ワリタロ会計部の JSON API（フェーズ1 / ADR 0012）。

    - 認証は既存の Cookie セッション（`session_id`、署名付き・SameSite=Lax）を流用する。
      フェーズ1は同一オリジンからの利用を前提とする。
    - 全エンドポイントは認証ユーザーが所属するグループ（Setting）のデータのみを返す（テナント分離）。
    - エラーは `{ "error": { "code": ..., "message": ... } }` 形式に統一。
      バリデーション失敗（422）は `details` にメッセージ一覧を含む。

servers:
  - url: /
    description: 同一オリジン

tags:
  - name: Sheets
    description: 月次シート
  - name: SheetItems
    description: シート費用項目

paths:
  /api/v1/sheets:
    get:
      tags: [Sheets]
      summary: シート一覧
      description: 認証ユーザーのグループのシートを新しい順（year_month 降順）で返す。ページネーション対応。
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: シート一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SheetsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/sheets/{year_month}/settlement:
    get:
      tags: [Sheets]
      summary: 精算結果
      description: 指定シートの精算結果（各人の負担合計と共有費用合計）を返す。
      parameters:
        - $ref: '#/components/parameters/YearMonth'
      responses:
        '200':
          description: 精算結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/sheets/{year_month}/sheet_items:
    post:
      tags: [SheetItems]
      summary: 費用項目の追加
      description: |
        指定シートに費用項目を追加する。
        `card_id` を指定する場合、同じグループのカードである必要がある（異なるグループのカードは 422）。
      parameters:
        - $ref: '#/components/parameters/YearMonth'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SheetItemCreateRequest'
      responses:
        '201':
          description: 作成された費用項目
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SheetItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableContent'

components:
  parameters:
    YearMonth:
      name: year_month
      in: path
      required: true
      description: 対象シートの年月（YYYY-MM）
      schema:
        type: string
        pattern: '^\d{4}-(0[1-9]|1[0-2])$'
        example: "2026-03"
    Page:
      name: page
      in: query
      required: false
      description: ページ番号（既定 1、1 未満は 1 に補正）
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      required: false
      description: 1ページあたりの件数（既定 20、上限 100）
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    Sheet:
      type: object
      properties:
        id:
          type: integer
          example: 1
        year_month:
          type: string
          example: "2026-03"
        label:
          type: string
          example: "2026年3月"
      required: [id, year_month, label]

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total_count:
          type: integer
          example: 35
        total_pages:
          type: integer
          example: 2
      required: [page, per_page, total_count, total_pages]

    SheetsResponse:
      type: object
      properties:
        sheets:
          type: array
          items:
            $ref: '#/components/schemas/Sheet'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required: [sheets, pagination]

    Settlement:
      type: object
      properties:
        deposit_a:
          type: integer
          description: A の負担合計
          example: 4000
        deposit_b:
          type: integer
          description: B の負担合計
          example: 5000
        total_shared_amount:
          type: integer
          description: 共有費用の合計（deposit_a + deposit_b）
          example: 9000
      required: [deposit_a, deposit_b, total_shared_amount]

    SettlementResponse:
      type: object
      properties:
        sheet:
          $ref: '#/components/schemas/Sheet'
        settlement:
          $ref: '#/components/schemas/Settlement'
      required: [sheet, settlement]

    SheetItem:
      type: object
      properties:
        id:
          type: integer
          example: 10
        name:
          type: string
          example: "電気代"
        amount:
          type: integer
          example: 8000
        burden_a:
          type: integer
          example: 4000
        burden_b:
          type: integer
          example: 4000
        card_id:
          type: integer
          nullable: true
          example: null
        is_from_template:
          type: boolean
          example: false
      required: [id, name, amount, burden_a, burden_b, is_from_template]

    SheetItemCreateRequest:
      type: object
      properties:
        sheet_item:
          type: object
          properties:
            name:
              type: string
              example: "電気代"
            amount:
              type: integer
              minimum: 0
              example: 8000
            burden_a:
              type: integer
              minimum: 0
              example: 4000
            burden_b:
              type: integer
              minimum: 0
              example: 4000
            card_id:
              type: integer
              nullable: true
              description: 紐付けるカード（同一グループのカードのみ可）
          required: [name, amount, burden_a, burden_b]
      required: [sheet_item]

    SheetItemResponse:
      type: object
      properties:
        sheet_item:
          $ref: '#/components/schemas/SheetItem'
      required: [sheet_item]

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "not_found"
            message:
              type: string
              example: "リソースが見つかりません"
          required: [code, message]
      required: [error]

    ValidationError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "unprocessable_content"
            message:
              type: string
              example: "保存に失敗しました"
            details:
              type: array
              items:
                type: string
              example: ["Name can't be blank"]
          required: [code, message, details]
      required: [error]

  responses:
    BadRequest:
      description: 必須パラメータの欠落
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "bad_request"
              message: "必須パラメータがありません: sheet_item"
    Unauthorized:
      description: 未認証
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "unauthorized"
              message: "認証が必要です"
    Forbidden:
      description: グループ未所属
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "forbidden"
              message: "グループに参加していません"
    NotFound:
      description: リソースが見つからない（他グループのシート含む）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "not_found"
              message: "リソースが見つかりません"
    UnprocessableContent:
      description: バリデーション失敗
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
